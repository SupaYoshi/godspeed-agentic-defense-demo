<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Godspeed Agentic Defense Architecture</title>
  <desc id="desc">Layered architecture showing Copilot front door, Godspeed orchestrator, Microsoft Foundry and Agent Framework, specialist defense agents, and evidence with approval gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #17212b; letter-spacing: 0; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #475569; }
      .zone-label { font-size: 15px; font-weight: 700; fill: #334155; }
      .box-title { font-size: 18px; font-weight: 700; }
      .box-body { font-size: 13px; fill: #475569; }
      .small { font-size: 12px; fill: #475569; }
      .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .zone { fill: #f8fafc; stroke: #d7dee8; stroke-width: 1.5; rx: 18; }
      .input { fill: #eef6ff; stroke: #8cbbe8; stroke-width: 1.5; rx: 12; }
      .process { fill: #eefbf6; stroke: #8cc5b5; stroke-width: 1.5; rx: 12; }
      .microsoft { fill: #f3f0ff; stroke: #b7a8ea; stroke-width: 1.5; rx: 12; }
      .agent { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.5; rx: 10; }
      .risk { fill: #fff8e8; stroke: #f4c978; stroke-width: 1.5; rx: 12; }
      .output { fill: #fff1f0; stroke: #f0a6a1; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="48" y="56" class="title">Godspeed Agentic Defense</text>
  <text x="48" y="84" class="subtitle">Governed defense missions with Copilot, Foundry, Agent Framework, specialist agents and approval gates</text>

  <rect x="40" y="120" width="250" height="500" class="zone"/>
  <text x="64" y="154" class="zone-label">Enterprise Front Door</text>
  <rect x="68" y="190" width="194" height="110" class="input"/>
  <text x="90" y="226" class="box-title">Microsoft 365</text>
  <text x="90" y="250" class="box-title">Copilot</text>
  <text x="90" y="278" class="box-body">User starts a mission</text>
  <rect x="68" y="340" width="194" height="110" class="input"/>
  <text x="90" y="376" class="box-title">Copilot Studio</text>
  <text x="90" y="404" class="box-body">Collects context</text>
  <text x="90" y="424" class="box-body">and boundaries</text>

  <rect x="340" y="120" width="260" height="500" class="zone"/>
  <text x="364" y="154" class="zone-label">Command Layer</text>
  <rect x="372" y="220" width="196" height="150" class="process"/>
  <text x="398" y="260" class="box-title">Godspeed</text>
  <text x="398" y="284" class="box-title">Orchestrator</text>
  <text x="398" y="316" class="box-body">Mission intake</text>
  <text x="398" y="338" class="box-body">Agent waves</text>
  <text x="398" y="360" class="box-body">Safety gates</text>

  <rect x="650" y="120" width="260" height="500" class="zone"/>
  <text x="674" y="154" class="zone-label">Microsoft Runtime Path</text>
  <rect x="682" y="205" width="196" height="115" class="microsoft"/>
  <text x="704" y="244" class="box-title">Foundry Agent</text>
  <text x="704" y="268" class="box-title">Service</text>
  <text x="704" y="296" class="box-body">Managed deployment</text>
  <rect x="682" y="365" width="196" height="115" class="microsoft"/>
  <text x="704" y="404" class="box-title">Agent Framework</text>
  <text x="704" y="432" class="box-body">Multi-agent workflow</text>
  <text x="704" y="452" class="box-body">State and telemetry</text>

  <rect x="960" y="120" width="280" height="500" class="zone"/>
  <text x="984" y="154" class="zone-label">Specialists, Gates, Evidence</text>
  <rect x="990" y="185" width="220" height="68" class="agent"/>
  <text x="1012" y="214" class="box-title">Threat + Exposure</text>
  <text x="1012" y="236" class="box-body">What is coming and what is reachable?</text>
  <rect x="990" y="272" width="220" height="68" class="agent"/>
  <text x="1012" y="301" class="box-title">Vulnerability + Logs</text>
  <text x="1012" y="323" class="box-body">What matters first and can we see it?</text>
  <rect x="990" y="359" width="220" height="68" class="agent"/>
  <text x="1012" y="388" class="box-title">Simulation + Change</text>
  <text x="1012" y="410" class="box-body">What can be tested before production?</text>
  <rect x="990" y="446" width="220" height="68" class="risk"/>
  <text x="1012" y="475" class="box-title">Approval Gates</text>
  <text x="1012" y="497" class="box-body">Scan, patch, isolate, communicate</text>
  <rect x="990" y="533" width="220" height="68" class="output"/>
  <text x="1012" y="562" class="box-title">Evidence Package</text>
  <text x="1012" y="584" class="box-body">Mission plan and executive summary</text>

  <path d="M262 245 C300 245, 320 290, 372 290" class="line"/>
  <path d="M568 290 C610 290, 630 262, 682 262" class="line"/>
  <path d="M568 320 C610 320, 630 420, 682 420" class="line"/>
  <path d="M878 262 C925 262, 945 219, 990 219" class="line"/>
  <path d="M878 420 C925 420, 945 393, 990 393" class="line"/>
  <path d="M1100 427 L1100 446" class="line"/>
  <path d="M1100 514 L1100 533" class="line"/>

  <rect x="48" y="650" width="1184" height="34" fill="#f8fafc" stroke="#d7dee8" rx="8"/>
  <text x="68" y="672" class="small">Safety model: read-only first, lab-first validation, sample data in demo mode, human approval before production actions.</text>
</svg>
